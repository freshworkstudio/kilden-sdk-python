# Every job runs in an ubuntu container: setup-php/python/ruby only ship
# prebuilt toolchains for GitHub's ubuntu images and fail outright on the lab
# runners, which are Debian 13. buildpack-deps carries the git + build tools
# those actions expect on top of it.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: kilden-runners
    container: buildpack-deps:jammy
    strategy:
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      - run: pytest -m "not integration" -q

  lint:
    runs-on: kilden-runners
    container: buildpack-deps:jammy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy

  integration:
    runs-on: kilden-runners
    container: buildpack-deps:jammy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: kildenhq/kilden-sdk-spec
          path: .spec
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: .spec/mockserver/go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: full suite against the spec mock server (vectors + gunicorn fork safety)
        run: pytest -q
        env:
          KILDEN_SPEC_DIR: ${{ github.workspace }}/.spec

  build:
    runs-on: kilden-runners
    container: buildpack-deps:jammy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
