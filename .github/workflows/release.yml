name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  pypi:
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.PYPI_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - name: publish to PyPI
        if: ${{ env.HAS_TOKEN == 'true' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*
      - name: no PYPI_TOKEN configured — skipping upload (see RELEASE.md)
        if: ${{ env.HAS_TOKEN != 'true' }}
        run: echo "PYPI_TOKEN secret is missing; artifacts built but not uploaded."
      - name: github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
